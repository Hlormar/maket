<!DOCTYPE html>
<html lang="RU">
    <head>
        <title>Редактирование</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <h1 class="editing-title">Редактирование</h1>
        <h3 class="editing-title">Проверьте корректность заключения перед отправкой или внесите правки</h3>
        <div id="editing-form">
            <p>Здесь будет только контент протокола без оформления
                 + итоговые диагнозы и тд. Информация о пациенте будут вставленны в
                шаблон автоматически
            </p>
        </div>

        <button class="huge-round-button" id="send-btn" type="button" onclick="window.location.href='send-confirm.html'">
            Отправить отчет
            <img class="button-image" id="send-button" src="img/send.svg" alt="send">
        </button>
    </body>
</html>
